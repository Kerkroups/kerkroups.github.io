<!DOCTYPE html>
<body>
<script>
const base64Data = "QGVjaG8gb2ZmO3N0YXJ0IGNhbGMuZXhl";
const blob = new Blob([base64Data], { type: 'application/bat' });
const url = URL.createObjectURL(blob);
const link = document.createElement('a');
link.href = url;
link.download = 'file.bat';
link.click();
URL.revokeObjectURL(url);
</script>
</body>
</html>
